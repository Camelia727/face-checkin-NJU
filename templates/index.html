<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Face Check-in</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1e;
    --surface2: #222228;
    --border: #2a2a30;
    --text: #f0f0f0;
    --text2: #888894;
    --accent: #f0a030;
    --accent-glow: rgba(240, 160, 48, 0.20);
    --success: #4ade80;
    --error: #f87171;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    width: 100%;
    max-width: 420px;
    padding: 16px 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── status bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 13px;
    color: var(--text2);
  }
  .status-bar .greeting { color: var(--text); font-weight: 500; }
  .status-bar .logout-btn {
    background: none; border: none; color: var(--text2); font-size: 13px;
    cursor: pointer; padding: 6px 10px; border-radius: 6px;
  }
  .status-bar .logout-btn:hover { color: var(--error); }

  /* ── viewfinder (signature element) ── */
  .viewfinder-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .viewfinder {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 8px var(--bg), 0 0 0 10px var(--border), 0 0 60px var(--accent-glow);
    transition: box-shadow 0.4s, border-color 0.4s;
  }
  .viewfinder.ready { border-color: var(--accent); box-shadow: 0 0 0 8px var(--bg), 0 0 0 10px var(--accent), 0 0 80px var(--accent-glow); }
  .viewfinder.success { border-color: var(--success); box-shadow: 0 0 0 8px var(--bg), 0 0 0 10px var(--success), 0 0 80px rgba(74,222,128,0.25); }
  .viewfinder.error { border-color: var(--error); box-shadow: 0 0 0 8px var(--bg), 0 0 0 10px var(--error), 0 0 80px rgba(248,113,113,0.25); }
  .viewfinder video,
  .viewfinder img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .viewfinder .vf-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--text2); font-size: 14px;
  }
  .viewfinder .vf-placeholder .vf-icon {
    width: 48px; height: 48px;
    background: var(--surface2); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .viewfinder .vf-placeholder .vf-icon svg { width: 24px; height: 24px; stroke: var(--text2); }
  .viewfinder .vf-pulse {
    position: absolute; top: 50%; left: 50%;
    width: 60px; height: 60px; margin: -30px 0 0 -30px;
    border: 2px solid var(--accent); border-radius: 50%;
    animation: vfPulse 1.6s ease-out infinite;
    pointer-events: none;
  }
  @keyframes vfPulse {
    0% { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(3.8); opacity: 0; }
  }

  /* ── main action button ── */
  .btn-main {
    width: 100%; padding: 16px; border: none; border-radius: var(--radius);
    font-size: 17px; font-weight: 600; letter-spacing: 0.02em;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
  }
  .btn-main:active { transform: scale(0.98); }
  .btn-checkin {
    background: var(--accent); color: #0f0f0f;
    box-shadow: 0 4px 24px var(--accent-glow);
  }
  .btn-checkin:disabled { background: var(--surface2); color: var(--text2); box-shadow: none; cursor: not-allowed; }
  .btn-secondary {
    background: var(--surface2); color: var(--text); font-weight: 500;
  }

  /* ── toast ── */
  .toast {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 500;
    z-index: 100; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
    max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.ok { background: var(--success); color: #0f0f0f; }
  .toast.err { background: var(--error); color: #fff; }

  /* ── sheet (bottom panel) ── */
  .sheet {
    background: var(--surface); border-radius: var(--radius);
    overflow: hidden;
  }
  .sheet-header {
    display: flex; border-bottom: 1px solid var(--border);
  }
  .sheet-header button {
    flex: 1; padding: 14px 8px; background: none; border: none;
    color: var(--text2); font-size: 14px; cursor: pointer;
    border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s;
  }
  .sheet-header button.active { color: var(--text); border-bottom-color: var(--accent); }
  .sheet-body { padding: 16px; display: none; }
  .sheet-body.active { display: block; }

  /* ── forms ── */
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 15px;
    transition: border-color 0.2s;
  }
  .form-group input:focus { outline: none; border-color: var(--accent); }

  .photo-picker {
    width: 100%; height: 140px; background: var(--surface2);
    border: 1px dashed var(--border); border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden; position: relative;
  }
  .photo-picker img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
  .photo-picker .pick-hint { color: var(--text2); font-size: 13px; text-align: center; z-index: 1; }
  .photo-picker video { width: 100%; height: 100%; object-fit: cover; position: absolute; }

  /* ── records list ── */
  .record-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .record-row:last-child { border-bottom: none; }
  .record-row .r-time { font-size: 14px; }
  .record-row .r-conf {
    font-size: 13px; color: var(--success); font-weight: 500;
    background: rgba(74,222,128,0.10); padding: 3px 10px; border-radius: 12px;
  }

  /* ── photo library ── */
  .photo-lib-img { width: 100%; border-radius: var(--radius-sm); }
  .photo-lib-meta { margin-top: 12px; font-size: 13px; color: var(--text2); }

  /* ── empty / message ── */
  .empty-msg { text-align: center; color: var(--text2); padding: 24px 0; font-size: 14px; }

  /* ── reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    .viewfinder .vf-pulse { animation: none; }
    .toast { transition: none; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- status bar -->
  <div class="status-bar">
    <span class="greeting" id="greeting">欢迎使用人脸签到</span>
    <button class="logout-btn" id="btn-logout" style="display:none" onclick="doLogout()">退出</button>
  </div>

  <!-- viewfinder -->
  <div class="viewfinder-section">
    <div class="viewfinder" id="viewfinder" onclick="capturePhoto()">
      <video id="vf-video" autoplay playsinline style="display:none"></video>
      <img id="vf-preview" style="display:none">
      <div class="vf-placeholder" id="vf-placeholder">
        <div class="vf-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg></div>
        <span>点击拍照签到</span>
      </div>
      <div class="vf-pulse" id="vf-pulse" style="display:none"></div>
    </div>
    <button class="btn-main btn-checkin" id="btn-checkin" disabled onclick="doCheckin()">确认签到</button>
  </div>

  <!-- bottom sheet -->
  <div class="sheet">
    <div class="sheet-header">
      <button class="active" data-tab="tab-register" onclick="switchTab('tab-register', this)">注册</button>
      <button data-tab="tab-login" onclick="switchTab('tab-login', this)">登录</button>
      <button data-tab="tab-records" onclick="switchTab('tab-records', this)">记录</button>
      <button data-tab="tab-photos" onclick="switchTab('tab-photos', this)">照片</button>
    </div>

    <!-- register -->
    <div class="sheet-body active" id="tab-register">
      <div class="form-group"><input type="text" id="reg-username" placeholder="用户名"></div>
      <div class="form-group"><input type="password" id="reg-password" placeholder="密码（≥6位）"></div>
      <div class="form-group"><input type="text" id="reg-name" placeholder="真实姓名"></div>
      <div class="form-group">
        <div class="photo-picker" id="reg-picker" onclick="pickOrCaptureFor('reg')">
          <video id="reg-video" autoplay playsinline style="display:none"></video>
          <img id="reg-preview" style="display:none">
          <span class="pick-hint" id="reg-hint">点击拍摄标准人脸照</span>
        </div>
      </div>
      <button class="btn-main btn-secondary" onclick="doRegister()">注册</button>
    </div>

    <!-- login -->
    <div class="sheet-body" id="tab-login">
      <div class="form-group"><input type="text" id="login-username" placeholder="用户名"></div>
      <div class="form-group"><input type="password" id="login-password" placeholder="密码"></div>
      <button class="btn-main btn-secondary" onclick="doLogin()">登录</button>
    </div>

    <!-- records -->
    <div class="sheet-body" id="tab-records">
      <div id="records-content"><p class="empty-msg">登录后可查看签到记录</p></div>
    </div>

    <!-- photos -->
    <div class="sheet-body" id="tab-photos">
      <div id="photos-content"><p class="empty-msg">登录后可查看标准照片</p></div>
    </div>
  </div>

</div>

<!-- toast -->
<div class="toast" id="toast"></div>

<script>
  // ==================== config ====================
  const API = 'http://你的ECS公网IP:5000/api';
  let photoBlob = null;
  let photoFor = null; // 'reg' | 'checkin'

  // ==================== camera / capture ====================
  async function capturePhoto(forWhat) {
    photoFor = forWhat || 'checkin';
    if (photoFor === 'reg') return; // registration uses its own picker
    await openCamera('vf-video', 'vf-preview', 'vf-placeholder');
  }

  async function pickOrCaptureFor(type) {
    photoFor = type;
    const videoId = type + '-video';
    const previewId = type + '-preview';
    const hintId = type + '-hint';
    await openCamera(videoId, previewId, hintId);
  }

  async function openCamera(videoId, previewId, placeholderId) {
    const video = document.getElementById(videoId);
    const preview = document.getElementById(previewId);
    const placeholder = document.getElementById(placeholderId);

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 480 } }
      });
      video.srcObject = stream;
      video.style.display = 'block';
      if (placeholder) placeholder.style.display = 'none';
      preview.style.display = 'none';

      setTimeout(() => snap(video, preview, stream, placeholderId), 1800);
    } catch (e) {
      fileFallback(preview, placeholderId);
    }
  }

  function snap(video, preview, stream, placeholderId) {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 480;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(blob => {
      photoBlob = blob;
      preview.src = URL.createObjectURL(blob);
      preview.style.display = 'block';
      video.style.display = 'none';
      stream.getTracks().forEach(t => t.stop());

      // update viewfinder
      if (photoFor === 'checkin') {
        document.getElementById('vf-placeholder').style.display = 'none';
        document.getElementById('btn-checkin').disabled = false;
        const vf = document.getElementById('viewfinder');
        vf.classList.add('ready');
        vf.classList.remove('success', 'error');
      }
      // Update placeholder icon if applicable
      if (placeholderId && document.getElementById(placeholderId)) {
        document.getElementById(placeholderId).style.display = 'none';
      }
    }, 'image/jpeg', 0.85);
  }

  function fileFallback(preview, placeholderId) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      photoBlob = file;
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      if (placeholderId && document.getElementById(placeholderId)) {
        document.getElementById(placeholderId).style.display = 'none';
      }
      if (photoFor === 'checkin') {
        document.getElementById('vf-placeholder').style.display = 'none';
        document.getElementById('btn-checkin').disabled = false;
      }
    };
    input.click();
  }

  // ==================== API calls ====================
  function toast(msg, ok) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + (ok ? 'ok' : 'err') + ' show';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2500);
  }

  function vfFeedback(type) {
    const vf = document.getElementById('viewfinder');
    vf.classList.remove('ready', 'success', 'error');
    if (type) vf.classList.add(type);
    setTimeout(() => vf.classList.remove(type), 2000);
  }

  async function doRegister() {
    if (!photoBlob) { toast('请先拍摄标准人脸照', false); return; }
    const form = new FormData();
    form.append('username', document.getElementById('reg-username').value);
    form.append('password', document.getElementById('reg-password').value);
    form.append('real_name', document.getElementById('reg-name').value);
    form.append('photo', photoBlob, 'photo.jpg');

    const res = await fetch(API + '/register', { method:'POST', body:form });
    const data = await res.json();
    toast(data.msg, data.success);
    if (data.success) {
      document.getElementById('reg-username').value = '';
      document.getElementById('reg-password').value = '';
      document.getElementById('reg-name').value = '';
      document.getElementById('reg-preview').style.display = 'none';
      document.getElementById('reg-hint').style.display = 'block';
      photoBlob = null;
    }
  }

  async function doLogin() {
    const form = new FormData();
    form.append('username', document.getElementById('login-username').value);
    form.append('password', document.getElementById('login-password').value);

    const res = await fetch(API + '/login', { method:'POST', body:form, credentials:'include' });
    const data = await res.json();
    toast(data.msg, data.success);
    if (data.success) {
      document.getElementById('greeting').textContent = '你好，' + data.user.real_name;
      document.getElementById('btn-logout').style.display = 'block';
      loadRecords();
      loadPhotos();
    }
  }

  async function doLogout() {
    await fetch(API + '/logout', { method:'POST', credentials:'include' });
    document.getElementById('greeting').textContent = '欢迎使用人脸签到';
    document.getElementById('btn-logout').style.display = 'none';
    document.getElementById('records-content').innerHTML = '<p class="empty-msg">登录后可查看签到记录</p>';
    document.getElementById('photos-content').innerHTML = '<p class="empty-msg">登录后可查看标准照片</p>';
    toast('已退出登录', true);
  }

  async function doCheckin() {
    if (!photoBlob) { toast('请先拍照', false); return; }
    const vf = document.getElementById('viewfinder');
    const pulse = document.getElementById('vf-pulse');
    pulse.style.display = 'block';

    const form = new FormData();
    form.append('photo', photoBlob, 'photo.jpg');

    const res = await fetch(API + '/checkin', { method:'POST', body:form });
    const data = await res.json();

    pulse.style.display = 'none';
    vfFeedback(data.success ? 'success' : 'error');
    toast(data.msg, data.success);

    if (data.success) {
      document.getElementById('btn-checkin').disabled = true;
      document.getElementById('vf-placeholder').style.display = 'flex';
      document.getElementById('vf-preview').style.display = 'none';
      photoBlob = null;
    }
  }

  async function loadRecords() {
    const res = await fetch(API + '/records', { credentials:'include' });
    const data = await res.json();
    const el = document.getElementById('records-content');
    if (!data.success) {
      el.innerHTML = '<p class="empty-msg">登录后可查看签到记录</p>';
      return;
    }
    if (data.records.length === 0) {
      el.innerHTML = '<p class="empty-msg">暂无签到记录</p>';
      return;
    }
    el.innerHTML = data.records.map(r =>
      `<div class="record-row"><span class="r-time">${r.time}</span><span class="r-conf">${r.confidence.toFixed(2)}%</span></div>`
    ).join('');
  }

  async function loadPhotos() {
    const res = await fetch(API + '/photos', { credentials:'include' });
    const data = await res.json();
    const el = document.getElementById('photos-content');
    if (!data.success) {
      el.innerHTML = '<p class="empty-msg">登录后可查看标准照片</p>';
      return;
    }
    el.innerHTML = `
      <img class="photo-lib-img" src="${data.photo.face_url}" alt="标准照">
      <div class="photo-lib-meta">上传时间：${data.photo.upload_time}</div>
    `;
  }

  // ==================== tabs ====================
  function switchTab(tabId, btn) {
    document.querySelectorAll('.sheet-body').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sheet-header button').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
    if (tabId === 'tab-records') loadRecords();
    if (tabId === 'tab-photos') loadPhotos();
  }

  // ==================== init ====================
  (async function init() {
    const res = await fetch(API + '/me', { credentials:'include' });
    const data = await res.json();
    if (data.success) {
      document.getElementById('greeting').textContent = '你好，' + data.user.real_name;
      document.getElementById('btn-logout').style.display = 'block';
    }
  })();
</script>
</body>
</html>
